<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="color-scheme" content="light">
<meta name="theme-color" content="#f5f0e6">
<meta name="format-detection" content="telephone=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>Kirole 手机与设备怎么配合 / How the App & Device Work Together</title>
<style>
:root {
  --paper: oklch(96% 0.014 85);
  --paper-raised: oklch(99% 0.006 85);
  --ink: oklch(21% 0.006 85);
  --ink-soft: oklch(46% 0.012 85);
  --line: oklch(85% 0.014 85);
  --line-strong: oklch(72% 0.016 85);

  --c-black: oklch(21% 0 0);
  --c-white: oklch(99% 0 0);
  --c-yellow: oklch(86% 0.15 96);
  --c-yellow-ink: oklch(40% 0.09 80);
  --c-red: oklch(56% 0.19 25);
  --c-red-soft: oklch(94% 0.045 25);
  --c-blue: oklch(52% 0.13 255);
  --c-blue-soft: oklch(94% 0.03 255);
  --c-green: oklch(52% 0.12 148);
  --c-green-soft: oklch(94% 0.04 148);

  --radius-s: 8px;
  --radius-m: 12px;
  --radius-l: 18px;

  --font-sans: "Iowan Old Style", "Georgia", "Noto Serif SC", ui-serif, serif;
  --font-ui: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
  --font-mono: ui-monospace, "SF Mono", Menlo, Consolas, monospace;

  --nav-w: 250px;
  --dur: 200ms;
}

* { box-sizing: border-box; }

html, body {
  margin: 0;
  padding: 0;
  background: var(--paper);
  color: var(--ink);
  font-family: var(--font-ui);
  -webkit-font-smoothing: antialiased;
}

body {
  background-image: radial-gradient(oklch(0% 0 0 / 0.025) 1px, transparent 1px);
  background-size: 4px 4px;
}

h1, h2, h3, h4 {
  font-family: var(--font-sans);
  font-weight: 600;
  line-height: 1.3;
  margin: 0 0 0.5em;
}

p { line-height: 1.7; margin: 0 0 1em; color: var(--ink-soft); }

/* ---------- language toggle ---------- */
.lang-toggle {
  position: fixed;
  top: 16px;
  right: 16px;
  z-index: 60;
  font-family: var(--font-mono);
  font-size: 0.8rem;
  padding: 8px 14px;
  background: var(--c-black);
  color: var(--c-white);
  border: none;
  border-radius: 999px;
  cursor: pointer;
  box-shadow: 0 2px 10px oklch(0% 0 0 / 0.18);
  transition: transform var(--dur) ease;
}
.lang-toggle:hover { transform: translateY(-1px); }

/* ---------- shell / nav ---------- */
.shell { display: flex; align-items: flex-start; min-height: 100vh; }

.sidenav {
  position: sticky;
  top: 0;
  height: 100vh;
  width: var(--nav-w);
  flex: 0 0 var(--nav-w);
  overflow-y: auto;
  padding: 28px 18px 40px;
  border-right: 1px solid var(--line);
  background: var(--paper-raised);
}
.sidenav-brand {
  display: flex;
  align-items: center;
  gap: 8px;
  font-family: var(--font-sans);
  font-weight: 700;
  font-size: 1.02rem;
  margin-bottom: 22px;
  padding-bottom: 14px;
  border-bottom: 1px solid var(--line);
}
.brand-mark { color: var(--c-red); }

.sidenav-list { list-style: none; margin: 0; padding: 0; display: flex; flex-direction: column; gap: 2px; }
.sidenav-list a {
  display: block;
  padding: 7px 10px;
  border-radius: var(--radius-s);
  color: var(--ink-soft);
  text-decoration: none;
  font-size: 0.87rem;
  transition: background var(--dur) ease, color var(--dur) ease;
}
.sidenav-list a:hover { background: var(--line); color: var(--ink); }
.sidenav-list .sub a { padding-left: 22px; font-size: 0.82rem; }
.sidenav-list .group-label {
  font-size: 0.72rem;
  letter-spacing: 0.05em;
  color: var(--ink-soft);
  padding: 14px 10px 4px;
  opacity: 0.7;
}

.nav-toggle {
  display: none;
  position: fixed;
  top: 14px;
  left: 14px;
  z-index: 61;
  width: 40px;
  height: 40px;
  border-radius: 50%;
  border: 1px solid var(--line-strong);
  background: var(--paper-raised);
  cursor: pointer;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 4px;
}
.nav-toggle-bar { width: 18px; height: 2px; background: var(--ink); border-radius: 2px; }

.main { flex: 1 1 auto; min-width: 0; padding: 56px 48px 100px; max-width: 900px; }

/* ---------- hero ---------- */
.hero { margin-bottom: 52px; }
.hero-eyebrow {
  font-family: var(--font-mono);
  font-size: 0.76rem;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--c-red);
  margin-bottom: 10px;
}
.hero-title { font-size: clamp(1.7rem, 1.3rem + 1.6vw, 2.5rem); max-width: 30ch; text-wrap: balance; }
.hero-sub { max-width: 60ch; font-size: 1.02rem; }
.hero-legend { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 18px; }

/* ---------- sections ---------- */
.section { margin-bottom: 72px; }
.section-kicker {
  font-family: var(--font-mono);
  font-size: 0.74rem;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: var(--ink-soft);
  margin-bottom: 6px;
}
.section-title { font-size: 1.5rem; margin-bottom: 10px; }
.section-desc { max-width: 64ch; }

/* ---------- legend / tags ---------- */
.tag {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  font-size: 0.74rem;
  padding: 3px 10px;
  border-radius: 999px;
  border: 1px solid transparent;
  white-space: nowrap;
}
.tag-live { background: var(--c-green-soft); color: var(--c-green); border-color: oklch(52% 0.12 148 / 0.35); }
.tag-pending { background: var(--c-yellow); color: var(--c-yellow-ink); border-color: oklch(40% 0.09 80 / 0.3); }
.tag-issue { background: var(--c-red-soft); color: var(--c-red); border-color: oklch(56% 0.19 25 / 0.35); }
.tag-dead { background: oklch(90% 0.006 85); color: var(--ink-soft); border-color: var(--line-strong); }
.tag-new { background: var(--c-blue-soft); color: var(--c-blue); border-color: oklch(52% 0.13 255 / 0.35); }

.actor-pill {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-size: 0.76rem;
  padding: 4px 11px;
  border-radius: 999px;
  color: var(--c-white);
}
.actor-pill.a-user { background: var(--c-yellow-ink); }
.actor-pill.a-app { background: var(--c-blue); }
.actor-pill.a-device { background: var(--c-black); }
.actor-pill.a-external { background: var(--c-green); }

/* ---------- big picture map ---------- */
.bigmap {
  display: grid;
  grid-template-columns: 1fr auto 1.15fr auto 1fr;
  align-items: stretch;
  gap: 6px;
  margin: 26px 0 10px;
}
.bigmap-card {
  background: var(--paper-raised);
  border: 1.5px solid var(--line-strong);
  border-radius: var(--radius-m);
  padding: 16px 14px;
  text-align: center;
  display: flex;
  flex-direction: column;
  gap: 6px;
  justify-content: center;
}
.bigmap-card .bm-emoji { font-size: 1.7rem; }
.bigmap-card h3 { font-size: 0.95rem; margin: 0; }
.bigmap-card p { font-size: 0.8rem; margin: 0; }
.bigmap-card.bm-app { border-color: var(--c-blue); box-shadow: 0 3px 14px oklch(52% 0.13 255 / 0.12); }
.bigmap-card.bm-device { border-color: var(--c-black); }
.bigmap-card.bm-external { border-style: dashed; }

.bigmap-link {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 4px;
  padding: 0 4px;
  min-width: 74px;
}
.bigmap-link .bm-arrow { font-size: 1.5rem; color: var(--line-strong); line-height: 1; }
.bigmap-link .bm-label {
  font-size: 0.7rem;
  color: var(--ink-soft);
  text-align: center;
  line-height: 1.4;
  max-width: 110px;
}

.bigmap-captions { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 26px; }
.bigmap-captions span {
  font-size: 0.8rem;
  color: var(--ink-soft);
  background: var(--paper-raised);
  border: 1px solid var(--line);
  border-radius: 999px;
  padding: 5px 12px;
}

/* ---------- overview cards ---------- */
.overview-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(230px, 1fr));
  gap: 14px;
  margin-top: 20px;
}
.overview-card {
  background: var(--paper-raised);
  border: 1px solid var(--line);
  border-radius: var(--radius-m);
  padding: 18px;
}
.overview-card h3 { font-size: 0.98rem; margin-bottom: 6px; }
.overview-card p { font-size: 0.88rem; margin: 0; }
.overview-card .oc-icon { font-size: 1.35rem; margin-bottom: 8px; display: block; }

/* ---------- flow block ---------- */
.flow-block {
  background: var(--paper-raised);
  border: 1px solid var(--line);
  border-radius: var(--radius-l);
  padding: 28px 26px 24px;
  margin-bottom: 30px;
}
.flow-block h3 { font-size: 1.18rem; margin-bottom: 6px; }
.flow-block > p { max-width: 62ch; }

.flow-note {
  font-size: 0.88rem;
  line-height: 1.65;
  color: var(--ink);
  background: oklch(97% 0.012 85);
  border-left: 3px solid var(--c-yellow-ink);
  padding: 10px 14px;
  border-radius: 0 var(--radius-s) var(--radius-s) 0;
  margin-top: 16px;
}
.flow-note.warn { border-left-color: var(--c-red); background: var(--c-red-soft); }

/* ---------- vertical flowchart ---------- */
.fc { display: flex; flex-direction: column; align-items: center; margin-top: 20px; }

.fc-node {
  width: 100%;
  max-width: 620px;
  background: var(--paper);
  border: 1px solid var(--line-strong);
  border-radius: var(--radius-m);
  padding: 13px 16px;
  display: flex;
  gap: 13px;
  align-items: flex-start;
  box-shadow: 0 1px 4px oklch(0% 0 0 / 0.05);
}
.fc-badge {
  flex: 0 0 auto;
  width: 42px;
  height: 42px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.25rem;
  border: 1.5px solid transparent;
}
.fc-badge.a-user { background: var(--c-yellow); border-color: oklch(40% 0.09 80 / 0.3); }
.fc-badge.a-app { background: var(--c-blue-soft); border-color: oklch(52% 0.13 255 / 0.35); }
.fc-badge.a-device { background: oklch(92% 0.004 85); border-color: var(--line-strong); }
.fc-badge.a-external { background: var(--c-green-soft); border-color: oklch(52% 0.12 148 / 0.35); }

.fc-body { flex: 1 1 auto; min-width: 0; }
.fc-who {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  font-size: 0.73rem;
  font-weight: 600;
  letter-spacing: 0.04em;
  margin-bottom: 4px;
}
.fc-who .who-name.a-user { color: var(--c-yellow-ink); }
.fc-who .who-name.a-app { color: var(--c-blue); }
.fc-who .who-name.a-device { color: var(--c-black); }
.fc-who .who-name.a-external { color: var(--c-green); }
.fc-body p { font-size: 0.92rem; line-height: 1.6; margin: 0; color: var(--ink); }

/* arrow between nodes */
.fc-arrow { display: flex; flex-direction: column; align-items: center; padding: 3px 0; }
.fc-arrow .fa-line { width: 3px; height: 16px; background: var(--line-strong); border-radius: 2px; }
.fc-arrow .fa-head {
  width: 0; height: 0;
  border-left: 8px solid transparent;
  border-right: 8px solid transparent;
  border-top: 10px solid var(--line-strong);
}
.fc-arrow .fa-label {
  font-size: 0.76rem;
  padding: 3px 12px;
  margin: 4px 0;
  border-radius: 999px;
  background: var(--paper-raised);
  border: 1px solid var(--line-strong);
  color: var(--ink-soft);
  text-align: center;
  max-width: 340px;
  line-height: 1.5;
}
.fc-arrow.tone-ble .fa-label { background: var(--c-blue-soft); border-color: oklch(52% 0.13 255 / 0.4); color: var(--c-blue); }
.fc-arrow.tone-instant .fa-label { background: var(--c-green-soft); border-color: oklch(52% 0.12 148 / 0.4); color: var(--c-green); }
.fc-arrow.tone-wait .fa-label { background: var(--c-yellow); border-color: oklch(40% 0.09 80 / 0.35); color: var(--c-yellow-ink); }

/* branch */
.fc-branch {
  width: 100%;
  max-width: 720px;
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 16px;
  margin: 4px 0;
}
.fc-branch-col {
  display: flex;
  flex-direction: column;
  align-items: center;
  border: 1.5px dashed var(--line-strong);
  border-radius: var(--radius-m);
  padding: 14px 12px;
  background: oklch(97.5% 0.01 85);
}
.fc-branch-col.tone-ok { border-color: oklch(52% 0.12 148 / 0.5); }
.fc-branch-col.tone-bad { border-color: oklch(56% 0.19 25 / 0.5); }
.fc-branch-label {
  font-size: 0.8rem;
  font-weight: 600;
  padding: 4px 14px;
  border-radius: 999px;
  margin-bottom: 12px;
}
.fc-branch-col.tone-ok .fc-branch-label { background: var(--c-green-soft); color: var(--c-green); }
.fc-branch-col.tone-bad .fc-branch-label { background: var(--c-red-soft); color: var(--c-red); }
.fc-branch-col .fc-node { max-width: 100%; }

/* ---------- issues ---------- */
.issue-list { display: flex; flex-direction: column; gap: 14px; margin-top: 20px; }
.issue-card {
  background: var(--paper-raised);
  border: 1px solid var(--line);
  border-left: 4px solid var(--c-red);
  border-radius: var(--radius-m);
  padding: 16px 18px;
}
.issue-card.pending { border-left-color: var(--c-yellow-ink); }
.issue-card h4 { font-size: 0.98rem; margin: 0 0 6px; display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
.issue-card p { font-size: 0.88rem; margin: 0; }

/* ---------- appendix tables ---------- */
details.appendix {
  background: var(--paper-raised);
  border: 1px solid var(--line);
  border-radius: var(--radius-l);
  padding: 6px 22px;
}
details.appendix summary {
  cursor: pointer;
  font-family: var(--font-sans);
  font-weight: 600;
  font-size: 1.05rem;
  padding: 14px 0;
  list-style: none;
}
details.appendix summary::-webkit-details-marker { display: none; }
details.appendix summary::before { content: "▸ "; color: var(--c-red); }
details.appendix[open] summary::before { content: "▾ "; }

.table-wrap {
  overflow-x: auto;
  border: 1px solid var(--line);
  border-radius: var(--radius-m);
  margin: 14px 0 28px;
  background: var(--paper-raised);
}
table { border-collapse: collapse; width: 100%; font-size: 0.85rem; min-width: 620px; }
thead th {
  background: var(--c-black);
  color: var(--c-white);
  text-align: left;
  font-family: var(--font-mono);
  font-weight: 600;
  font-size: 0.72rem;
  letter-spacing: 0.03em;
  text-transform: uppercase;
  padding: 10px 14px;
}
tbody td { padding: 10px 14px; border-top: 1px solid var(--line); vertical-align: top; }
tbody tr:hover { background: oklch(98% 0.01 85); }
.table-title { font-size: 1.02rem; margin: 26px 0 4px; }
.table-caption { font-size: 0.85rem; margin-bottom: 4px; }

.rules-title { font-size: 1rem; margin: 24px 0 4px; }
.rules-table { margin-top: 10px; }
.rules-table table { min-width: 560px; }
.rules-table td:first-child { width: 24%; }
.rules-table td .diff { color: var(--c-red); font-weight: 600; }
.rules-table td .same { color: var(--c-green); font-weight: 600; }

.byte-badge {
  font-family: var(--font-mono);
  font-size: 0.76rem;
  font-weight: 600;
  padding: 2px 8px;
  border-radius: var(--radius-s);
  background: var(--c-black);
  color: var(--c-white);
}
.byte-badge.dir-in { background: var(--c-blue); }

/* ---------- footer ---------- */
.page-footer { border-top: 1px solid var(--line); padding-top: 20px; margin-top: 40px; }
.page-footer p { font-size: 0.8rem; margin: 0; }

/* ---------- responsive ---------- */
@media (max-width: 1024px) {
  .sidenav {
    position: fixed;
    left: 0;
    top: 0;
    z-index: 55;
    transform: translateX(-100%);
    transition: transform var(--dur) ease;
    box-shadow: 0 0 40px oklch(0% 0 0 / 0.25);
  }
  .sidenav.open { transform: translateX(0); }
  .nav-toggle { display: flex; }
  .main { padding: 84px 24px 80px; }
  body.nav-open::after {
    content: "";
    position: fixed;
    inset: 0;
    background: oklch(0% 0 0 / 0.35);
    z-index: 50;
  }
}

@media (max-width: 760px) {
  .bigmap { grid-template-columns: 1fr; }
  .bigmap-link { flex-direction: row; min-width: 0; padding: 2px 0; }
  .bigmap-link .bm-arrow { transform: rotate(90deg); font-size: 1.3rem; }
  .fc-branch { grid-template-columns: 1fr; }
}

@media (max-width: 480px) {
  .main { padding: 84px 14px 64px; }
  .flow-block { padding: 20px 14px 18px; }
}


/* ---------- mobile polish (single-file client delivery) ---------- */
html {
  -webkit-text-size-adjust: 100%;
  text-size-adjust: 100%;
  scroll-behavior: smooth;
}

body {
  padding-left: env(safe-area-inset-left);
  padding-right: env(safe-area-inset-right);
  padding-bottom: env(safe-area-inset-bottom);
}

.lang-toggle {
  top: max(12px, env(safe-area-inset-top));
  right: max(12px, env(safe-area-inset-right));
  min-height: 44px;
  min-width: 44px;
  padding: 10px 16px;
  font-size: 0.85rem;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
}

.nav-toggle {
  top: max(12px, env(safe-area-inset-top));
  left: max(12px, env(safe-area-inset-left));
  width: 44px;
  height: 44px;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
}

.sidenav-list a {
  min-height: 44px;
  display: flex;
  align-items: center;
  -webkit-tap-highlight-color: transparent;
}

details.appendix summary {
  min-height: 48px;
  display: flex;
  align-items: center;
  -webkit-tap-highlight-color: transparent;
}

@media (max-width: 1024px) {
  .main {
    padding-top: max(88px, calc(env(safe-area-inset-top) + 72px));
  }
  .sidenav {
    padding-top: max(28px, calc(env(safe-area-inset-top) + 16px));
    width: min(86vw, 300px);
  }
}

@media (max-width: 760px) {
  .hero-title {
    font-size: clamp(1.45rem, 6.2vw, 1.9rem);
    max-width: none;
  }
  .hero-sub { font-size: 0.98rem; }
  .section { margin-bottom: 48px; }
  .section-title { font-size: 1.28rem; }
  .flow-block h3 { font-size: 1.08rem; }
  .fc-node {
    padding: 12px 12px;
    gap: 10px;
  }
  .fc-badge {
    width: 38px;
    height: 38px;
    font-size: 1.1rem;
  }
  .fc-body p { font-size: 0.9rem; }
  .fc-arrow .fa-label {
    max-width: min(92vw, 320px);
    font-size: 0.74rem;
  }
  .tag, .actor-pill { white-space: normal; }
  .hero-legend { gap: 6px; }
  .bigmap-card { padding: 14px 12px; }
  table { min-width: 540px; font-size: 0.8rem; }
  .rules-table table { min-width: 480px; }
  thead th, tbody td { padding: 9px 10px; }
}

@media (max-width: 480px) {
  .lang-toggle {
    font-size: 0.78rem;
    padding: 9px 12px;
  }
  .overview-grid { grid-template-columns: 1fr; gap: 10px; }
  .issue-card { padding: 14px; }
  .page-footer { padding-bottom: 8px; }
}

/* Prefer readable type on small screens without zoom thrash */
@media (hover: none) and (pointer: coarse) {
  .sidenav-list a:hover { background: transparent; color: var(--ink-soft); }
  .sidenav-list a:active { background: var(--line); color: var(--ink); }
  tbody tr:hover { background: transparent; }
  .lang-toggle:hover { transform: none; }
  .lang-toggle:active { transform: scale(0.98); }
}

</style>
</head>
<body>

<button id="langToggle" class="lang-toggle" type="button" aria-label="Switch language">中文 / EN</button>

<div class="shell">
  <nav class="sidenav" id="sidenav" aria-label="Section navigation">
    <div class="sidenav-brand">
      <span class="brand-mark" aria-hidden="true">◆</span>
      <span data-i18n="brand.title"></span>
    </div>
    <ol class="sidenav-list" id="sidenavList"></ol>
  </nav>

  <button id="navToggle" class="nav-toggle" type="button" aria-expanded="false" aria-controls="sidenav" aria-label="Open menu">
    <span class="nav-toggle-bar"></span>
    <span class="nav-toggle-bar"></span>
    <span class="nav-toggle-bar"></span>
  </button>

  <main class="main" id="main">
    <header class="hero">
      <p class="hero-eyebrow" data-i18n="hero.eyebrow"></p>

    { byte: "0x21", name: "EventLogBatch", status: "dead", zh: "仅入站方向使用；手机从不出站发送此编号", en: "Inbound-only; the phone never sends this byte outbound" },
    { byte: "0x7E", name: "SecureData", status: "live", zh: "加密封装外壳；需配置共享密钥才启用（当前默认关闭）", en: "Secure envelope; engages only with a configured shared secret (currently off)" },
    { byte: "0x7F", name: "SecurityHandshake", status: "live", zh: "加密握手第一步，同上仅安全模式使用", en: "Security handshake step one, secure mode only" }
  ]
};

const TABLE2 = {
  head: { zh: ["编号", "事件", "作用", "状态"], en: ["Byte", "Event", "What it does", "Status"] },
  rows: [
    { byte: "0x01–0x06", name: "旋钮 / 电源键", nameEn: "Knob / power button", status: "live", zh: "旋转、短按、长按等物理操作——目前仅记录", en: "Rotate/short-press/long-press etc. — currently just recorded" },
    { byte: "0x10", name: "EnterTaskIn", status: "issue", zh: "进任务/开始专注——见流程图；当前设备发送格式与约定不符（已知问题②）", en: "Enter task / start focus — see flowchart; device currently sends a non-conforming format (known gap #2)" },
    { byte: "0x11", name: "CompleteTask", status: "live", zh: "任务完成，结束专注", en: "Task completed, ends the focus session" },
    { byte: "0x12", name: "SkipTask", status: "live", zh: "跳过任务，结束专注但不打勾", en: "Skips the task, ends focus without checking it off" },
    { byte: "0x13", name: "SelectedTaskChanged", status: "live", zh: "切换选中任务——仅记录", en: "Selected task changed — recorded only" },
    { byte: "0x14", name: "WheelSelect", status: "live", zh: "旋钮确认——按约定不回复详情页", en: "Wheel confirm — per agreement, no detail-page reply" },
    { byte: "0x15", name: "ViewEventDetail", status: "live", zh: "查看日历事件详情——仅记录", en: "Views a calendar event's detail — recorded only" },
    { byte: "0x16", name: "ReminderAcknowledged", status: "live", zh: "用户确认了智能提醒", en: "User acknowledged a smart reminder" },
    { byte: "0x17", name: "ReminderDismissed", status: "live", zh: "智能提醒超时自动关闭", en: "Smart reminder auto-dismissed on timeout" },
    { byte: "0x18", name: "OTAResult", status: "new", zh: "对「开始升级」指令的答复状态码", en: "Status-code reply to the upgrade command" },
    { byte: "0x20", name: "RequestRefresh", status: "live", zh: "设备主动请求刷新（60 秒内最多响应一次）", en: "Device actively requests a refresh (honored at most once per 60s)" },
    { byte: "0x21", name: "EventLogBatch", status: "live", zh: "离线操作批量补传", en: "Batch replay of offline operations" },
    { byte: "0x30", name: "DeviceWake", status: "live", zh: "设备亮屏（带电量；新版起带固件版本号）", en: "Device woke (battery %; firmware version since the latest revision)" },
    { byte: "0x31", name: "DeviceSleep", status: "live", zh: "设备进入休眠", en: "Device going to sleep" },
    { byte: "0x40", name: "LowBattery", status: "live", zh: "低电量——手机弹出本地通知", en: "Low battery — the phone raises a local notification" }
  ]
};

const TABLE3 = {
  head: { zh: ["字段", "作用"], en: ["Field", "Purpose"] },
  rows: [
    { name: "Year / Month / Day", zh: "顶部日期", en: "Top-bar date" },
    { name: "DeviceMode", zh: "设备界面模式（普通 / 专注）", en: "Device UI mode (normal / focus)" },
    { name: "FocusChallengeEnabled", zh: "专注挑战玩法开关", en: "Focus-challenge feature switch" },
    { name: "PetDialogue", zh: "伙伴的一句台词（早安 / 鼓励 / 晚间结算按时段切换）", en: "The companion's one line (morning / encouragement / evening, by time of day)" },
    { name: "Events[]（≤8）", zh: "日程：时间 + 标题 + 描述", en: "Events: time + title + description" },
    { name: "TopTasks[]（3–5 条，依屏幕尺寸）", zh: "置顶任务：编号 + 标题 + 是否完成 + 优先级", en: "Pinned tasks: ID + title + done flag + priority" },
    { name: "SettlementData", zh: "今日统计：完成数、积分、专注分钟、次数、最长一次、打断次数", en: "Today's stats: completions, points, focus minutes, sessions, longest, interruptions" },
    { name: "DaySummary", zh: "「今日概览」一段中性文字", en: "The neutral \"day at a glance\" paragraph" },
    { name: "FirstUp", zh: "「接下来」标签：下一个日程，或最高优先级未完成任务", en: "\"First up\": the next event, or the top-priority open task" }

const REUSED_BYTES = {
  head: { zh: ["编号", "手机 → 设备", "设备 → 手机"], en: ["Byte", "Phone → Device", "Device → Phone"] },
  rows: [
    { byte: "0x10", out: "DayPack", in: "EnterTaskIn" },
    { byte: "0x11", out: "TaskInPage", in: "CompleteTask" },
    { byte: "0x12", out: "DeviceMode", in: "SkipTask" },
    { byte: "0x13", out: "SmartReminder", in: "SelectedTaskChanged" },
    { byte: "0x14", out: "FocusStatus", in: "WheelSelect" },
    { byte: "0x15", out: "CustomAvatarFrame", in: "ViewEventDetail" },
    { byte: "0x16", out: "Screensaver", in: "ReminderAcknowledged" },
    { byte: "0x17", out: "SceneUnlock", in: "ReminderDismissed" },
    { byte: "0x18", out: "OTAReboot", in: "OTAResult" },
    { byte: "0x20", out: "EventLogRequest", in: "RequestRefresh" },
    { byte: "0x21", out: "—", in: "EventLogBatch" }
  ]
};


const STATUS_LABELS = {
  live: { zh: "✓ 已经能用", en: "✓ Works today" },
  pending: { zh: "⏳ 等设备端开发", en: "⏳ Awaiting device dev" },
  issue: { zh: "⚠ 已知问题", en: "⚠ Known issue" },
  dead: { zh: "协议保留", en: "Reserved" },
  new: { zh: "新增", en: "New" }
};

const state = {
  lang: localStorage.getItem("kirole-lang") === "en" ? "en" : "zh"
};

function pick(obj) {
  return obj[state.lang];
}

function statusTag(status) {
  if (!status) return "";
  return `<span class="tag tag-${status}">${pick(STATUS_LABELS[status])}</span>`;
}

/* ---------- hero ---------- */

function renderLegend() {
  document.getElementById("heroLegend").innerHTML = LEGEND.map(item =>
    `<span class="${item.cls}">${pick(item.label)}</span>`
  ).join("");
}

/* ---------- overview ---------- */

function bigmapCard(node, extraClass) {
  return `
    <div class="bigmap-card ${extraClass}">
      <span class="bm-emoji" aria-hidden="true">${node.emoji}</span>
      <h3>${pick(node.title)}</h3>
      <p>${pick(node.body)}</p>
    </div>`;
}

function bigmapLink(link) {
  return `
    <div class="bigmap-link">
      <span class="bm-arrow" aria-hidden="true">${link.arrow}</span>
      <span class="bm-label">${pick(link.label)}</span>
    </div>`;
}

function renderOverview() {
  const cards = OVERVIEW_CARDS.map(card => `
    <div class="overview-card">
      <span class="oc-icon" aria-hidden="true">${card.icon}</span>
      <h3>${pick(card.title)}</h3>
      <p>${pick(card.body)}</p>
    </div>`).join("");

  document.getElementById("section-overview").innerHTML = `
    <p class="section-kicker">01 / ${pick(UI["nav.overview"])}</p>
    <h2 class="section-title">${pick(UI["overview.title"])}</h2>
    <p class="section-desc">${pick(UI["overview.desc"])}</p>
    <div class="bigmap">
      ${bigmapCard(BIGMAP.external, "bm-external")}
      ${bigmapLink(BIGMAP.linkLeft)}
      ${bigmapCard(BIGMAP.app, "bm-app")}
      ${bigmapLink(BIGMAP.linkRight)}
      ${bigmapCard(BIGMAP.device, "bm-device")}
    </div>
    <div class="overview-grid">${cards}</div>`;
}

/* ---------- flowcharts ---------- */

function fcNode(item) {
  const actor = ACTORS[item.actor];
  return `
    <div class="fc-node">
      <span class="fc-badge a-${item.actor}" aria-hidden="true">${actor.emoji}</span>
      <div class="fc-body">
        <span class="fc-who">
          <span class="who-name a-${item.actor}">${pick(actor.name)}</span>
          ${statusTag(item.tag)}
        </span>
        <p>${pick(item.text)}</p>
      </div>
    </div>`;
}

function fcArrow(item) {
  const tone = item.tone ? ` tone-${item.tone}` : "";
  const label = item.label ? `<span class="fa-label">${pick(item.label)}</span>` : "";
  return `
    <div class="fc-arrow${tone}" aria-hidden="true">
      <span class="fa-line"></span>
      ${label}
      <span class="fa-line"></span>
      <span class="fa-head"></span>
    </div>`;
}

function fcItems(items) {
  return items.map(item => {
    if (item.t === "n") return fcNode(item);
    if (item.t === "a") return fcArrow(item);
    if (item.t === "b") return fcBranch(item);
    return "";
  }).join("");
}

function fcBranch(item) {
  const cols = item.cols.map(col => `
    <div class="fc-branch-col tone-${col.tone}">
      <span class="fc-branch-label">${pick(col.label)}</span>
      ${fcItems(col.items)}
    </div>`).join("");
  return `<div class="fc-branch">${cols}</div>`;
}

function flowRulesTable(rules) {
  if (!rules) return "";
  const ths = pick(rules.head).map(h => `<th>${h}</th>`).join("");
  const rows = rules.rows.map(r => `
    <tr>${r.cells.map((cell, i) =>
      `<td>${i === 0 ? `<strong>${pick(cell)}</strong>` : pick(cell)}</td>`
    ).join("")}</tr>`).join("");
  return `
    <h4 class="rules-title">${pick(rules.title)}</h4>
    <div class="table-wrap rules-table">
      <table><thead><tr>${ths}</tr></thead><tbody>${rows}</tbody></table>
    </div>`;
}

function renderFlows() {
  const blocks = FLOWS.map(flow => `
    <div class="flow-block" id="flow-${flow.id}">
      <h3>${pick(flow.title)}</h3>
      <p>${pick(flow.desc)}</p>
      <div class="fc">${fcItems(flow.chart)}</div>
      ${flowRulesTable(flow.rules)}
      ${(flow.notes || []).map(note =>
        `<div class="flow-note${note.warn ? " warn" : ""}">${pick(note)}</div>`
      ).join("")}
    </div>`).join("");

  document.getElementById("section-flows").innerHTML = `
    <p class="section-kicker">02 / ${pick(UI["nav.flows"])}</p>
    <h2 class="section-title">${pick(UI["flows.title"])}</h2>
    <p class="section-desc">${pick(UI["flows.desc"])}</p>
    ${blocks}`;
}

/* ---------- known gaps ---------- */

function renderIssues() {
  const cards = ISSUES.map((issue, i) => `
    <div class="issue-card ${issue.kind}">
      <h4>${statusTag(issue.kind === "pending" ? "pending" : "issue")} ${i + 1}. ${pick(issue.title)}</h4>
      <p>${pick(issue.body)}</p>
    </div>`).join("");

  document.getElementById("section-issues").innerHTML = `
    <p class="section-kicker">03 / ${pick(UI["nav.issues"])}</p>
    <h2 class="section-title">${pick(UI["issues.title"])}</h2>
    <p class="section-desc">${pick(UI["issues.desc"])}</p>
    <div class="issue-list">${cards}</div>`;
}

/* ---------- appendix tables ---------- */

function tableHtml(head, rowsHtml) {
  const ths = head.map(h => `<th>${h}</th>`).join("");
  return `<div class="table-wrap"><table><thead><tr>${ths}</tr></thead><tbody>${rowsHtml}</tbody></table></div>`;
}

function renderTable1() {
  const rows = TABLE1.rows.map(r => `
    <tr>
      <td><span class="byte-badge">${r.byte}</span></td>
      <td><strong>${r.name}</strong></td>
      <td>${pick({ zh: r.zh, en: r.en })}</td>
      <td>${statusTag(r.status)}</td>
    </tr>`).join("");
  return tableHtml(pick(TABLE1.head), rows);
}

function renderTable2() {
  const rows = TABLE2.rows.map(r => `
    <tr>
      <td><span class="byte-badge dir-in">${r.byte}</span></td>
      <td><strong>${r.name}</strong>${r.nameEn ? ` <span style="color:var(--ink-soft);font-size:.8em;">/ ${r.nameEn}</span>` : ""}</td>
      <td>${pick({ zh: r.zh, en: r.en })}</td>
      <td>${statusTag(r.status)}</td>
    </tr>`).join("");
  return tableHtml(pick(TABLE2.head), rows);
}

function renderTable3() {
  const rows = TABLE3.rows.map(r => `
    <tr>
      <td><strong>${r.name}</strong></td>
      <td>${pick({ zh: r.zh, en: r.en })}</td>
    </tr>`).join("");
  return tableHtml(pick(TABLE3.head), rows);
}

function renderReused() {
  const rows = REUSED_BYTES.rows.map(r => `
    <tr>
      <td><span class="byte-badge">${r.byte}</span></td>
      <td>${r.out}</td>
      <td>${r.in}</td>
    </tr>`).join("");
  return tableHtml(pick(REUSED_BYTES.head), rows);
}

function renderAppendix() {
  document.getElementById("section-appendix").innerHTML = `
    <p class="section-kicker">04 / ${pick(UI["nav.appendix"])}</p>
    <details class="appendix">
      <summary>${pick(UI["appendix.title"])}</summary>
      <p class="table-caption">${pick(UI["appendix.intro"])}</p>
      <h3 class="table-title">${pick(UI["table1.title"])}</h3>
      ${renderTable1()}
      <h3 class="table-title">${pick(UI["table2.title"])}</h3>
      ${renderTable2()}
      <h3 class="table-title">${pick(UI["table3.title"])}</h3>
      ${renderTable3()}
      <h3 class="table-title">${pick(UI["reused.title"])}</h3>
      ${renderReused()}
    </details>`;
}

/* ---------- nav / shell ---------- */

function renderNav() {
  const items = [];
  items.push(`<li><a href="#section-overview">${pick(UI["nav.overview"])}</a></li>`);
  items.push(`<li class="group-label">${pick(UI["nav.flows"])}</li>`);
  FLOWS.forEach(flow => {
    items.push(`<li class="sub"><a href="#flow-${flow.id}">${pick(flow.title)}</a></li>`);
  });
  items.push(`<li><a href="#section-issues">${pick(UI["nav.issues"])}</a></li>`);
  items.push(`<li><a href="#section-appendix">${pick(UI["nav.appendix"])}</a></li>`);
  document.getElementById("sidenavList").innerHTML = items.join("");
}

function applyStaticStrings() {
  document.querySelectorAll("[data-i18n]").forEach(el => {
    const key = el.getAttribute("data-i18n");
    if (UI[key]) el.textContent = pick(UI[key]);
  });
}

function renderAll() {
  document.documentElement.lang = state.lang;
  document.getElementById("langToggle").textContent = state.lang === "zh" ? "中文 / EN" : "EN / 中文";
  applyStaticStrings();
  renderLegend();
  renderOverview();
  renderFlows();
  renderIssues();
  renderAppendix();
  renderNav();
}

function closeNav() {
  const sidenav = document.getElementById("sidenav");
  const navToggle = document.getElementById("navToggle");
  sidenav.classList.remove("open");
  document.body.classList.remove("nav-open");
  navToggle.setAttribute("aria-expanded", "false");
}

function setupInteractions() {
  document.getElementById("langToggle").addEventListener("click", () => {
    state.lang = state.lang === "zh" ? "en" : "zh";
    localStorage.setItem("kirole-lang", state.lang);
    renderAll();
  });

  const sidenav = document.getElementById("sidenav");
  const navToggle = document.getElementById("navToggle");
  navToggle.addEventListener("click", () => {
    const isOpen = sidenav.classList.toggle("open");
    document.body.classList.toggle("nav-open", isOpen);
    navToggle.setAttribute("aria-expanded", String(isOpen));
  });
  sidenav.addEventListener("click", e => {
    if (e.target.tagName === "A") closeNav();
  });
  // Tap dark overlay to dismiss menu on phone
  document.body.addEventListener("click", e => {
    if (!document.body.classList.contains("nav-open")) return;
    if (sidenav.contains(e.target) || navToggle.contains(e.target)) return;
    closeNav();
  });
  window.addEventListener("keydown", e => {
    if (e.key === "Escape") closeNav();
  });
}

renderAll();
setupInteractions();

</script>
</body>
</html>
